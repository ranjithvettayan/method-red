  - {name: cross-chain-bridge, category: blockchain-asset, phases: [smart-contracts]}
  - {name: oracle-integration, category: blockchain-asset, phases: [smart-contracts]}
  - {name: crypto-wallet,     category: blockchain-asset,  phases: [smart-contracts]}

  # Forensic evidence (DFIR)
  - {name: evidence,          category: service}
  - {name: memory-image,      category: evidence,          phases: [dfir]}
  - {name: disk-image,        category: evidence,          phases: [dfir]}
  - {name: pcap,              category: evidence,          phases: [dfir]}
