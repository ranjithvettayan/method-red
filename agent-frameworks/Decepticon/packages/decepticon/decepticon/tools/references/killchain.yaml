# Kill-chain phase → tool mapping (committed fallback).
# Canonical phase names: recon, weaponization, delivery, exploitation,
# persistence, privilege-escalation, defense-evasion, credential-access,
# discovery, lateral-movement, collection, command-and-control,
# exfiltration, impact.
#
# Kept intentionally small and opinionated. Overlaid at runtime by the
# parsed RedTeam-Tools README when the cache is hydrated.

# ── Recon ──────────────────────────────────────────────────────────────
- name: nmap
  phase: recon
  description: The canonical port scanner and service identifier.
  url: https://nmap.org

- name: masscan
  phase: recon
  description: Internet-scale asynchronous port scanner.
  url: https://github.com/robertdavidgraham/masscan

- name: rustscan
  phase: recon
  description: Fast port scanner that hands off to nmap.
  url: https://github.com/RustScan/RustScan

- name: subfinder
  phase: recon
  description: Passive subdomain discovery from public sources.
  url: https://github.com/projectdiscovery/subfinder

- name: amass
  phase: recon
  description: Attack surface mapping and external asset discovery.
  url: https://github.com/owasp-amass/amass

- name: httpx
  phase: recon
  description: Fast HTTP prober and fingerprinter.
  url: https://github.com/projectdiscovery/httpx

- name: katana
  phase: recon
  description: Next-gen web crawler for attack surface discovery.
  url: https://github.com/projectdiscovery/katana

- name: dnsx
  phase: recon
  description: Fast DNS resolver and brute-forcer.
  url: https://github.com/projectdiscovery/dnsx

- name: whatweb
  phase: recon
  description: Identifies CMS, frameworks, and web technologies.
  url: https://github.com/urbanadventurer/WhatWeb

- name: wafw00f
  phase: recon
  description: Detects WAFs in front of a target.
  url: https://github.com/EnableSecurity/wafw00f

- name: theharvester
  phase: recon
  description: Emails, subdomains, and names from public sources.
