[project]
name = "decepticon-example-agent"
version = "0.0.1"
description = "Decepticon plugin scaffolded by decepticon-sdk."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.13"

dependencies = [
    "decepticon-sdk",
]

[project.entry-points."decepticon.agents"]
decepticon_example_agent = "decepticon_example_agent"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/decepticon_example_agent"]
