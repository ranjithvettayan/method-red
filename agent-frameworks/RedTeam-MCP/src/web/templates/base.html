<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Red Team MCP{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <style>
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    {% block nav %}
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-2xl">🤖</span>
                        <span class="ml-2 text-xl font-bold text-gray-900">Red Team MCP</span>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="/ui/" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium {% if request.url.path == '/ui/' %}border-indigo-500 text-gray-900{% endif %}">
                            Dashboard
                        </a>
                        <a href="/ui/chat" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium {% if '/chat' in request.url.path %}border-indigo-500 text-gray-900{% endif %}">
                            Chat
                        </a>
                        <a href="/ui/agents" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium {% if '/agents' in request.url.path %}border-indigo-500 text-gray-900{% endif %}">
                            Agents
                        </a>
                        <a href="/ui/teams" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium {% if '/teams' in request.url.path %}border-indigo-500 text-gray-900{% endif %}">
                            Teams
                        </a>
                        <a href="/ui/custom-providers" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium {% if '/custom-providers' in request.url.path %}border-indigo-500 text-gray-900{% endif %}">
                            Custom Providers
                        </a>
                        <a href="/ui/settings" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium {% if '/settings' in request.url.path %}border-indigo-500 text-gray-900{% endif %}">
                            Settings
                        </a>
                        <a href="/ui/statistics" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium {% if '/statistics' in request.url.path %}border-indigo-500 text-gray-900{% endif %}">
                            Statistics
                        </a>
                        <a href="/ui/export" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium {% if '/export' in request.url.path %}border-indigo-500 text-gray-900{% endif %}">
                            Export/Import
                        </a>
                    </div>
                </div>
                <div class="flex items-center">
                    <a href="/ui/logout" class="text-gray-500 hover:text-gray-700 text-sm font-medium">
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>
    {% endblock %}
    
    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="bg-white border-t mt-auto">
        <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
            <p class="text-center text-sm text-gray-500">
                Red Team MCP - Multi-Agent Collaboration Platform
            </p>
        </div>
    </footer>
</body>
</html>
