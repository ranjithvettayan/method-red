worker_processes 1;
events { worker_connections 1024; }

http {
    # In-memory proxy cache — keyed by URL only, NOT by X-Forwarded-Host
    proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=poison_cache:10m max_size=100m inactive=60m;

    upstream origin {
        server origin:5000;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://origin;
            # Forward the X-Forwarded-Host header (so origin reflects it)
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Host  $http_x_forwarded_host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Enable caching — keyed by URI only, NOT by request headers
            proxy_cache         poison_cache;
            proxy_cache_key     "$scheme$request_method$host$request_uri";
            proxy_cache_valid   200 5m;
            proxy_cache_methods GET HEAD;
            # Surface cache state for debugging
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
